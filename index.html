<!DOCTYPE html>
<html>
<head>
<title>Oakland Permit Waiting Counter</title>
<style>
body {
font-family: Arial, sans-serif;
max-width: 700px;
margin: 40px auto;
line-height: 1.6;
}

h1 {
color: #333;
}

.counter {
font-size: 28px;
font-weight: bold;
margin: 20px 0;
}

.box {
background: #f4f4f4;
padding: 15px;
margin: 10px 0;
}
</style>
</head>

<body>

<h1>Oakland Building Permit Waiting Time</h1>

<p>Application submitted: December 4, 2025</p>
<p>Application approved: March 26, 2026</p>
<p>Owner/Applicant informed of said approval:  Never!</p>

<div class="counter" id="days"></div>

<div class="box" id="comparisons"></div>

<script>

let startDate = new Date("2025-12-04");
let endDate = new Date("2026-03-26");

let diff = endDate - startDate;
let days = Math.floor(diff / (1000 * 60 * 60 * 24));
let cost = 9000;
let burrito_cost = 15;

document.getElementById("days").innerHTML =
days + " days in total.";

let pages_submitted = 27;
let ppd = (pages_submitted / days).toFixed(2);

let burritos = Math.floor(cost / burrito_cost);
let pge = Math.floor(cost / 200);
let foodbank = cost;

document.getElementById("comparisons").innerHTML = `
<p>Final statistics:  ${pages_submitted} pages submitted. ${ppd} pages reviewed per day. </p>


<p>With the money we paid the city you could have purchased <b>${burritos}</b> burritos.</p>
<p>Or paid approximately <b>${pge}</b> PG&E bills.</p>
<p>Or donated about <b>$${foodbank}</b> worth of food to the Alameda County Food Bank.</p>
<p>Or filled 6 potholes on Oakland streets.</p>
<p>Or paid 1.8% of the 2024 overtime compensation for the leader of the traffic unit and vice president of the OPOA police union.  Wait a second, bad idea!</p>

`;

</script>

</body>
</html>
