<!DOCTYPE html>
<html>
<head>
    <title>Oakland Permit Waiting Counter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            line-height: 1.6;
        }

        h1 {
            color: #333;
        }

        .counter {
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
        }

        .box {
            background: #f4f4f4;
            padding: 15px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<h1>Oakland Building Permit Waiting Time</h1>

<p>Application submitted: December 4, 2025</p>

<div class="counter" id="days"></div>

<div class="box" id="comparisons"></div>

<script>

let startDate = new Date("2025-12-04");
let today = new Date();

let diff = today - startDate;
let days = Math.floor(diff / (1000 * 60 * 60 * 24));

document.getElementById("days").innerHTML =
    days + " days and counting";

let burritos = Math.floor(days * 1.5);
let pge = Math.floor(days / 30);
let foodbank = days * 20;

document.getElementById("comparisons").innerHTML = `
<p>In this time you could have eaten <b>${burritos}</b> burritos.</p>
<p>Or paid approximately <b>${pge}</b> PG&E bills.</p>
<p>Or donated about <b>$${foodbank}</b> worth of food to the Alameda County Food Bank.</p>
<p>Permit status: Still waiting.</p>
`;

</script>

</body>
</html>
